<script type="module">
import { initCRT, setCRTEnabled } from '../effects/crt.js';
import { initStarfield, setStarsEnabled } from '../effects/starfield.js';
import { tracks } from '../audio/synth.js';
import { initMidiPlayer } from '../audio/midi-player.js';
import { initSFX } from '../audio/sfx.js';

function readBool(key, def) {
  try {
    var v = localStorage.getItem(key);
    if (v === null) return def;
    return v !== 'false';
  } catch (e) {
    return def;
  }
}

function crtLabel(on) {
  return '[ CRT: ' + (on ? 'ON' : 'OFF') + ' ]';
}
function starsLabel(on) {
  return '[ STARS: ' + (on ? 'ON' : 'OFF') + ' ]';
}

var crtBtn = document.getElementById('dade-toggle-crt');
var starsBtn = document.getElementById('dade-toggle-stars');
var crtCanvas = document.getElementById('dade-crt');
var starCanvas = document.getElementById('dade-starfield');

var crtOn = readBool('crt_enabled', true);
var starsOn = readBool('stars_enabled', true);

crtBtn.textContent = crtLabel(crtOn);
starsBtn.textContent = starsLabel(starsOn);

initCRT({ canvas: crtCanvas, enabled: crtOn });
initStarfield({ canvas: starCanvas });

crtBtn.addEventListener('click', function () {
  crtOn = !crtOn;
  setCRTEnabled(crtOn);
  crtBtn.textContent = crtLabel(crtOn);
});

starsBtn.addEventListener('click', function () {
  starsOn = !starsOn;
  setStarsEnabled(starsOn);
  starsBtn.textContent = starsLabel(starsOn);
});

var audioBase = '../';
var midiPlayerApi = null;
var midiLoadPromise = null;
var trackSelect = document.getElementById('track-select');
var viz = document.getElementById('viz');
var playSpan = document.getElementById('dade-play-audio');
var sfxSpan = document.getElementById('dade-sfx-toggle');

for (var ti = 0; ti < tracks.length; ti++) {
  var opt = document.createElement('option');
  opt.value = tracks[ti].name;
  opt.textContent = tracks[ti].name;
  trackSelect.appendChild(opt);
}

function stopAllSynth() {
  for (var si = 0; si < tracks.length; si++) tracks[si].stop();
}

function sfxRead() {
  try {
    return localStorage.getItem('sfx_enabled') === 'true';
  } catch (e) {
    return false;
  }
}

function sfxRefreshLabel() {
  sfxSpan.textContent = '[ SFX: ' + (sfxRead() ? 'ON' : 'OFF') + ' ]';
}

sfxRefreshLabel();

sfxSpan.addEventListener('click', function () {
  try {
    localStorage.setItem('sfx_enabled', sfxRead() ? 'false' : 'true');
  } catch (e) {}
  sfxRefreshLabel();
});

playSpan.addEventListener('click', function () {
  if (!midiLoadPromise) {
    midiLoadPromise = initMidiPlayer({ midiUrl: audioBase + 'sounds/midi.mid', canvas: viz });
  }
  midiLoadPromise
    .then(function (api) {
      midiPlayerApi = api;
      var ctx = globalThis.__dadeAudioCtx;
      return ctx.resume().then(function () {
        stopAllSynth();
        api.stopMidi();
        api.setMidiAudible(false, 0.03);
        api.startVisualizer();
        var sel = trackSelect.value;
        if (sel === 'midi') {
          api.setMidiAudible(true, 0.03);
          api.startMidi();
        } else {
          for (var pj = 0; pj < tracks.length; pj++) {
            if (tracks[pj].name === sel) {
              tracks[pj].play();
              break;
            }
          }
        }
        globalThis.__dadeAudioUnlocked = true;
      });
    })
    .catch(function (e) {
      console.error(e);
    });
});

trackSelect.addEventListener('change', function () {
  if (!midiPlayerApi || !globalThis.__dadeAudioUnlocked) return;
  midiPlayerApi.stopMidi();
  midiPlayerApi.setMidiAudible(false, 0.03);
  stopAllSynth();
  var name = trackSelect.value;
  if (name === 'midi') {
    midiPlayerApi.setMidiAudible(true, 0.03);
    midiPlayerApi.startMidi();
  } else {
    for (var sj = 0; sj < tracks.length; sj++) {
      if (tracks[sj].name === name) {
        tracks[sj].play();
        break;
      }
    }
  }
});

initSFX();
</script>
